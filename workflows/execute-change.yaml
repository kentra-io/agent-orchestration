# execute-change.yaml -- reads a spec-lifecycle plan and sequences its
# milestones through the milestone.yaml ladder (M5 sec 4 sketch), now
# structurally FLATTENED (M7) so per-attempt crash-safety survives across
# the whole change, not just within one milestone.
#
# read_plan -> cursor (root-level index counter, checkpoint-durable) ->
#              milestone_step (nested milestone.yaml call, one per
#              iteration) -> back to cursor -> ... -> full_healthcheck ->
#              archive_handoff (M8 change-level finish -- see the "finish"
#              section below) | healthcheck_failed
#
# Why this replaced the `for_each` structure (M7 flatten -- see
# workflows/README.md "Why milestone.yaml is not (only) run nested" for the
# full empirical finding this fixes, and tests/test_workflows_flatten.py for
# the before/after proof): Conductor only takes periodic (`every_agent`)
# checkpoints at the ROOT engine (`_subworkflow_depth == 0`); the OLD
# `for_each` group was itself a single root step whose per-item outputs only
# committed to context once the WHOLE group finished -- so a crash mid-change
# resumed the for_each from milestone 1, re-executing already-completed
# milestones (empirically confirmed by the M5 verifier: item_keys
# ['0','0','1','2'] after a mid-M2 kill). The FIX: the milestone-index
# *cursor* is now its own root-level `set` step (`cursor`), so its checkpoint
# -- taken at the top of the root loop, before the next step runs -- always
# reflects "how many milestones are already done", and `conductor resume`
# restores `current_agent_name` to whichever root step was about to run
# (either `cursor` or `milestone_step`) with every prior milestone's output
# already committed to context. Completed milestones are NEVER re-executed
# on resume; only the in-flight milestone's OWN ladder may restart from
# attempt 1 (ACCEPTABLE -- see milestone.yaml/README, this was already true
# and never violates the 3-attempt invariant since each restart is a fresh
# child run that recounts from zero).
#
# read_plan's source: in production this is the real spec-lifecycle
# machine-readable plan surface, `lifecycle apply <change> --format json`
# (spec-lifecycle main `4d1f002`, milestone M3 -- see
# orchestration/resume/plan.py's header docstring and
# orchestration/resume/README.md's "spec-lifecycle reality check" for the
# full, corrected account of what this superseded). In the hermetic tier
# here, a fixture JSON file with a `milestones` array stands in, shaped to
# match that real per-milestone surface -- `{"id": <int>, "title": <str>,
# "steps": [...], "contract": {...}}` per milestone (`contract` omitted
# when absent) -- see orchestration/resume/plan.py's `load_milestones`/
# `load_milestones_from_apply`/`derive_remaining_milestones` (M7) for how a
# *changed* plan's remaining milestones get re-derived into a fresh
# fixture file.
#
# Stub tier (hermetic):
#   CONDUCTOR_STUB_SCRIPT=path/to/script.json \
#     TMPDIR=<persistent-dir> conductor run workflows/execute-change.yaml \
#       --provider stub --input plan_fixture_path=tests/fixtures/execute_change_2_milestones.json

workflow:
  name: execute-change
  description: Sequences a spec-lifecycle change's milestones through the ladder.
  version: "2.0.0" # M7: flattened cursor loop (was a nested for_each in M5's 1.0.0)
  entry_point: read_plan

  runtime:
    provider: claudebox
    checkpoint:
      every_agent: true # P4/ADR-0002 -- now change-wide crash-safe (M7 flatten), not just per-milestone

  input:
    plan_fixture_path:
      type: string
      required: true
      description: >-
        Path to a fixture JSON file with a `milestones` array (each item:
        id, title, steps, contract). Stands in, in the hermetic tier, for
        the real `lifecycle apply <change> --format json` machine-readable
        plan surface -- see the header note above.
    box:
      type: string
      required: false
      default: ""
      description: >-
        The claudebox box/container id the ClaudeboxProvider `cb exec`s into.
        Supplied by the M8 launcher (`orchestration.launch.change`) as
        `--input box=<id>`; forwarded to milestone.yaml via milestone_step's
        input_mapping and read by the provider as workflow.input.box.
        Declared `required: false, default: ""` (NOT required) on purpose:
        Conductor does not validate required-input PRESENCE at run start
        (engine `_apply_input_defaults` silently omits a missing required
        input), and templates render under Jinja StrictUndefined -- so a
        required-but-absent box would crash the stub tier on template render
        rather than fail loudly at launch. The empty default renders cleanly
        in the stub tier (which never uses the provider); the live tier's
        loud failure is the provider's own non-retryable ProviderError when
        box is empty at first cast-agent turn.
    worktree:
      type: string
      required: false
      default: ""
      description: >-
        Absolute path of the box's worktree, forwarded by the provider as
        `cb exec --workdir <worktree>`. Optional; launcher supplies it.
    attempt_threshold:
      type: number
      required: false
      default: 3
    gates_l1_command:
      type: string
      required: false
      default: "exit 0"
    notify_dry_run:
      type: boolean
      required: false
      default: true
    branch:
      type: string
      required: false
      default: ""
      description: >-
        The run's named branch (default `change/<change_id>`, supplied by the
        launcher). Forwarded to milestone.yaml's `push`/`tick` mirror steps.
    push_dry_run:
      type: boolean
      required: false
      default: true
      description: >-
        Skip the real per-milestone `git push` in milestone.yaml's `push`
        step (hermetic default). The launcher flips this to false for the
        production (box) tier, alongside commit_dry_run, so every committed
        milestone is published to the run branch.
    notify_repo:
      type: string
      required: false
      description: >-
        "owner/repo" for milestone.yaml's `escalate`/`tick` GitHub mirrors
        (live tier only). Derived by the launcher from the repo's `origin`
        remote (payload `repo_gh` override wins); absent (hermetic) it renders
        as "" and no `gh` call is made. Closing the pre-existing gap where
        notify_repo/notify_issue were declared by milestone.yaml but never
        forwarded here.
    notify_issue:
      type: number
      required: false
      description: >-
        Issue number for milestone.yaml's `escalate`/`tick` GitHub mirrors
        (live tier only). Forwarded from the launcher's `--issue`.
    commit_dry_run:
      type: boolean
      required: false
      default: true
      description: >-
        Skip the real per-milestone `git commit` in milestone.yaml's
        `commit` step (hermetic default). The launcher flips this to false
        for the production (box) tier so every verified milestone is
        persisted as a commit -- see `orchestration.launch.milestone_commit`.
    change_id:
      type: string
      required: false
      default: ""
      description: >-
        The spec-lifecycle change id, passed to the `archive_handoff` step
        (M8) and forwarded to milestone.yaml for the commit-message suffix.
        Only required when `archive_dry_run` is false -- a hermetic
        run leaves this at the trivial default (`archive_handoff` never
        shells out to `lifecycle` while dry_run holds).
    healthcheck_command:
      type: string
      required: false
      default: "exit 0"
      description: >-
        M8 change-level finish, leg 1/2: the full L2 healthcheck command
        (the change-wide regression guard, run ONCE after every milestone's
        own ladder already passed) -- a real wiring templates the project's
        actual suite/build/lint command(s) here; the trivial always-pass
        default keeps a hermetic run's control-flow independent of a real
        project existing at the worktree.
    archive_dry_run:
      type: boolean
      required: false
      default: true
      description: >-
        M8 change-level finish, leg 2/2: skip the real `lifecycle archive`
        call (hermetic default -- see `orchestration.launch.archive_handoff`).
        Flip to false only from a real launch context with a real
        `lifecycle` binary and an `openspec/` tree at the worktree cwd.

  limits:
    # computed per P4: milestones * 4 + overhead. Sized generously for the
    # 10-milestone max_iterations DoD test; individual milestone ladders
    # have their own (separate) budget inside their own sub-workflow run.
    # The flatten adds ~2 root iterations per milestone (cursor + the
    # milestone_step call itself) -- still comfortably inside 60 for 10.
    max_iterations: 60

agents:
  - name: read_plan
    type: script
    description: Emits the change's milestones (fixture JSON in the hermetic tier).
    command: cat
    args: ["{{ workflow.input.plan_fixture_path }}"]
    routes:
      - to: cursor

  - name: cursor
    type: set
    description: >-
      ROOT-level milestone-index counter (M7 flatten) -- THE fix for
      change-wide crash safety. Because this `set` step lives at root
      workflow depth (never nested inside a `type: workflow` child), its
      periodic checkpoint (taken at the top of the root loop, before the
      next step executes) always reflects exactly how many milestones are
      already committed to context. `conductor resume` restores
      `current_agent_name` to this step or to `milestone_step` with every
      completed milestone's output intact -- none of them re-run. See
      workflows/README.md for the full before/after finding.
    values:
      index: "{{ (cursor.output.index if cursor is defined else -1) + 1 }}"
    routes:
      - to: milestone_step
        when: "{{ output.index < (read_plan.output.milestones | length) }}"
      - to: full_healthcheck

  - name: milestone_step
    type: workflow
    description: >-
      Runs ONE milestone's full 3-attempt ladder (milestone.yaml, unchanged
      from M5 -- kept nested purely for template reuse, not for its
      checkpoint behavior). Re-invoked once per loop iteration with the
      SAME step name (loop-back routing over a named step is the same
      pattern milestone.yaml's own ladder already uses for
      implementer/orchestrator).
    workflow: milestone.yaml
    input_mapping:
      # `milestone.yaml` declares its own `milestone_id`/`milestone_summary`
      # inputs (a stable, independent contract -- see workflows/milestone.yaml)
      # -- only the SOURCE expressions below changed (M7 fix): they now pull
      # `.id`/`.title`, the real per-milestone field names `lifecycle apply`
      # emits, instead of the invented `.milestone_id`/`.milestone_summary`.
      milestone_id: "{{ read_plan.output.milestones[cursor.output.index].id }}"
      milestone_summary: "{{ read_plan.output.milestones[cursor.output.index].title }}"
      attempt_threshold: "{{ workflow.input.attempt_threshold }}"
      # L1 gate wiring (#16 fix): forward the CURRENT milestone's own
      # contract.check, not just the static root default -- the same
      # dict-get idiom as commit_paths below (a plan item without a
      # `contract` key, or without a `check` field, must fall back to ''
      # rather than tripping StrictUndefined mid-render). milestone.yaml's
      # `gates` step gives this precedence over gates_l1_command whenever
      # it is non-empty and not the literal "none" sentinel.
      contract_check: >-
        {{ ((read_plan.output.milestones[cursor.output.index].get('contract')
        or {}).get('check') or '') }}
      gates_l1_command: "{{ workflow.input.gates_l1_command }}"
      notify_dry_run: "{{ workflow.input.notify_dry_run }}"
      # Mirror wiring (D9): forward the run branch, the push dry-run flag, the
      # repo/issue identity, and the milestone manifest so milestone.yaml's
      # `push`/`tick` steps can publish the branch and render the checklist.
      # This closes the today-unreachable gap where notify_repo/notify_issue
      # were declared by milestone.yaml but never forwarded from here.
      branch: "{{ workflow.input.branch }}"
      push_dry_run: "{{ workflow.input.push_dry_run }}"
      notify_repo: "{{ workflow.input.notify_repo }}"
      notify_issue: "{{ workflow.input.notify_issue }}"
      # The whole milestone list (ids + titles) the checklist renders from --
      # the same JSON-string idiom as commit_paths below.
      milestone_manifest: "{{ read_plan.output.milestones | tojson }}"
      # Milestone-commit wiring (durability finish): change_id feeds the
      # commit-message suffix, commit_dry_run gates the real git call (the
      # launcher flips it false for the production tier), commit_paths
      # confines `git add` to the milestone's declared contract.paths (the
      # same set the diff gate enforces).
      change_id: "{{ workflow.input.change_id }}"
      commit_dry_run: "{{ workflow.input.commit_dry_run }}"
      # dict-get access (not attribute access): a plan item without a
      # `contract` key must fall back to [] rather than tripping
      # StrictUndefined mid-render.
      commit_paths: "{{ ((read_plan.output.milestones[cursor.output.index].get('contract') or {}).get('paths') or []) | tojson }}"
      # The cast agents that actually call the ClaudeboxProvider live in the
      # NESTED milestone.yaml, not at this root -- and a `type: workflow`
      # child's `workflow.input` is populated ONLY from this input_mapping
      # (it does not inherit the root's workflow.input). So box/worktree
      # must be forwarded here for the provider to find them downstream.
      box: "{{ workflow.input.box }}"
      worktree: "{{ workflow.input.worktree }}"
    routes:
      - to: cursor

  - name: full_healthcheck
    type: script
    description: >-
      M8 change-level finish, leg 1/2: the full L2 healthcheck (the
      change-wide regression guard) run ONCE, after every milestone's own
      ladder has already passed -- `orchestration.harness.l2_healthcheck`,
      routed on its EXIT CODE (0 good, 1 needs-attention, 2 harness error --
      the same convention `milestone.yaml`'s `gates` step uses, not a
      `pass` JSON field).
    command: python3
    args: ["-m", "orchestration.harness.l2_healthcheck"]
    stdin: '{{ {"commands": [workflow.input.healthcheck_command]} | tojson }}'
    routes:
      - to: archive_handoff
        when: "{{ full_healthcheck.output.exit_code == 0 }}"
      - to: healthcheck_failed

  - name: healthcheck_failed
    type: set
    description: >-
      Terminal state: the change-level healthcheck failed, so no archive
      was attempted -- a broken suite/build must never fold into the
      living spec. See `output.status` below.
    values:
      status: healthcheck_failed
    routes:
      - to: "$end"

  - name: archive_handoff
    type: script
    description: >-
      M8 change-level finish, leg 2/2: shells `lifecycle archive
      <change_id> --format json` (never any force flag), honoring the
      tasks-completion gate (M3, `internal/archive/tasks_gate.go`). This
      is a deterministic `script` step -- the LAUNCH CONTEXT's own
      hand-off, not a Mode-B agent tool surface -- which is exactly the
      sec-7.3 boundary: the verb is allowed here BECAUSE no LLM holds it
      (`tests/test_consent_invariant.py` scans only agent-type steps and
      positively asserts this step stays type=script). `archive_dry_run`
      (hermetic default true) reports what WOULD run without touching
      `openspec/`; flip to false only from a real launch context with
      `lifecycle` on PATH and an `openspec/` tree at the worktree cwd.
      Exit-code contract (`orchestration.launch.archive_handoff`):
      0 archived, 1 refused (the gate's reason lands in `output.reason`,
      never a crash), 2 error.
    command: python3
    args: ["-m", "orchestration.launch.archive_handoff"]
    stdin: >-
      {{ {"worktree": ".", "change_id": workflow.input.change_id,
      "dry_run": workflow.input.archive_dry_run} | tojson }}
    routes:
      - to: "$end"

output:
  milestones_processed: "{{ cursor.output.index }}"
  status: >-
    {{ 'healthcheck_failed' if healthcheck_failed is defined
       else archive_handoff.output.status if archive_handoff is defined
       else 'unknown' }}
  archive_reason: "{{ archive_handoff.output.reason if archive_handoff is defined else none }}"
