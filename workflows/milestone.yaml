# milestone.yaml -- the 3-attempt escalation ladder for ONE spec-lifecycle
# milestone (M5: "the fine-direct demo").
#
# implementer -> gates -> verifier -> [commit -> $end | counter] -> [orchestrator | escalate]
#                  ^                                                     |
#                  +------------------ (loop back) ----------------------+
#
# Locked semantics (orchestration.md sec 4, implementation-plan.md P5):
#   - Exactly 3 resolution attempts: 1 solo + 2 orchestrator-guided.
#   - Conductor (not the Orchestrator agent) owns the counter and the
#     threshold flip to escalation -- the `counter` set-step + its routes.
#   - `gates` (the deterministic M4 harness aggregator) is routed on its
#     EXIT CODE, never a `pass` JSON field (flakiness has no `pass` key;
#     exit code is the one uniform signal every harness checker shares).
#   - `retry:` on the provider-backed steps is for TRANSIENT provider
#     errors only (provider_error/timeout) -- orthogonal to the ladder;
#     the `counter` set-step is the ONLY thing that counts resolution
#     attempts. See workflows/README.md for a load-bearing caveat: the
#     StubProvider (hermetic tier) does not itself implement retry (that
#     lives per-provider, e.g. claude.py/claudebox.py) -- `retry:` here is
#     the real wiring for the live tier; the hermetic tests prove the
#     structural separation (a provider error never reaches `counter`),
#     not the provider-level retry loop itself.
#
# Runnable standalone (this file IS the root workflow -- see
# workflows/README.md "Why milestone.yaml is not nested" for why: Conductor
# only periodic-checkpoints the ROOT engine, so this must run at depth 0 for
# the crash-safe counter claim (P4) to hold).
#
# Stub tier (hermetic, no box/LLM/network -- this is how M5's DoD is proven):
#   CONDUCTOR_STUB_SCRIPT=path/to/script.json \
#     TMPDIR=<persistent-dir> conductor run workflows/milestone.yaml \
#       --provider stub --input milestone_id=M1
#
# Live tier (M6+, real cast, real box -- not run in default CI):
#   TMPDIR=<persistent-dir> conductor run workflows/milestone.yaml \
#     --input milestone_id=M1 --input milestone_summary="..."

workflow:
  name: milestone-ladder
  description: The 3-attempt escalation ladder for one spec-lifecycle milestone.
  version: "1.0.0"
  entry_point: implementer

  runtime:
    provider: claudebox # production default; hermetic tests override via `--provider stub`
    checkpoint:
      every_agent: true # P4/ADR-0002 -- crash-safe, not just failure-only

  input:
    milestone_id:
      type: string
      required: true
      description: Identifier for this milestone (used in prompts/labels/events).
    box:
      type: string
      required: false
      default: ""
      description: >-
        The claudebox box/container id the ClaudeboxProvider `cb exec`s into.
        Read by the provider as workflow.input.box for the implementer/
        verifier/orchestrator cast agents below. Forwarded here by
        execute-change.yaml's milestone_step input_mapping (a nested
        `type: workflow` child's workflow.input comes ONLY from that
        mapping). Declared `required: false, default: ""` -- NOT required --
        for the same reason as execute-change.yaml: Conductor does not
        validate required-input presence at run start, and the empty default
        renders cleanly under Jinja StrictUndefined in the stub tier (which
        runs milestone.yaml standalone with `--provider stub`, never using
        the provider). The live tier's loud failure is the provider's own
        non-retryable ProviderError when box is empty.
    worktree:
      type: string
      required: false
      default: ""
      description: >-
        Absolute path of the box's worktree, forwarded by the provider as
        `cb exec --workdir <worktree>`. Optional; supplied via
        execute-change.yaml's milestone_step input_mapping.
    milestone_summary:
      type: string
      required: false
      default: ""
      description: Plain-language task + acceptance criteria for this milestone.
    attempt_threshold:
      type: number
      required: false
      default: 3
      description: Ladder threshold (locked default 3 -- 1 solo + 2 orchestrator-guided).
    gates_l1_command:
      type: string
      required: false
      default: "exit 0"
      description: >-
        The milestone's L1 acceptance-check command (exit-code gated). M5
        control-flow tests leave this at the trivial always-pass default and
        drive pass/fail entirely through the (stub-scripted) Verifier; a real
        wiring (M6+) templates the milestone's actual validation-contract
        command here.
    change_id:
      type: string
      required: false
      default: ""
      description: >-
        The spec-lifecycle change id, used only in the `commit` step's
        message suffix. Optional (empty in the stub tier / standalone runs);
        forwarded by execute-change.yaml's milestone_step input_mapping.
    commit_dry_run:
      type: boolean
      required: false
      default: true
      description: >-
        Skip the real `git add`/`git commit` in the `commit` step (hermetic
        default — the stub tier runs script steps for real, and must never
        commit into a checkout). The launcher flips this to false for the
        production tier so every verified milestone is committed at the
        same cadence as the checkpoint cursor (the durability gap from the
        first live runs — a crash between verification and a human's
        out-of-band commit used to lose verified work).
    commit_paths:
      type: string
      required: false
      default: ""
      description: >-
        JSON-encoded list of pathspecs confining the `commit` step's
        `git add` — the milestone's declared contract.paths, forwarded by
        execute-change.yaml. Empty = stage the whole worktree. Confinement
        keeps an errant out-of-declared-paths write uncommitted (surfaced
        in the next diff) instead of silently folding it into the milestone
        commit.
    notify_dry_run:
      type: boolean
      required: false
      default: true
      description: >-
        Skip the real `gh` call in the `escalate` step (hermetic default).
        Flip to false only in the live tier (M7+), alongside notify_repo/notify_issue.
    notify_repo:
      type: string
      required: false
      description: '"owner/repo" for the escalate step''s GitHub-label mirror (live tier only).'
    notify_issue:
      type: number
      required: false
      description: Issue number for the escalate step's GitHub-label mirror (live tier only).

  limits:
    # 3 attempts * 3 provider/script steps (implementer/gates/verifier) + 2
    # orchestrator resolutions + counter + escalate + human_gate + the
    # success-path commit step, with headroom (P4: "computed from the plan,
    # generously oversized").
    max_iterations: 22

agents:
  - name: implementer
    # Persona: personas/implementer.md (materialized at
    # <worktree>/.claude/agents/implementer.md). The provider passes
    # `--agent implementer`, so the persona's MUST/HALT contract (spec sec 6.2)
    # is the system prompt; this inline prompt supplies only per-invocation
    # task context. `--model opus` overrides the frontmatter model; the
    # persona's `effort: medium` (spec sec 6) rides the frontmatter.
    description: Does the milestone's work -- solo on attempt 1, guided by the Orchestrator on attempts 2-3.
    model: opus # spec sec 6: Implementer = Opus, medium effort (effort in persona frontmatter)
    input:
      - workflow.input.milestone_id
      - workflow.input.milestone_summary
      - orchestrator.output?
    prompt: |
      Milestone: {{ workflow.input.milestone_id }}
      {{ workflow.input.milestone_summary }}

      {% if orchestrator is defined and orchestrator.output %}
      Guidance from a prior failed attempt:
      {{ orchestrator.output.guidance }}
      {% endif %}

      Read spec.md, tasks.md, and this milestone's validation contract, then do
      the work for THIS milestone only, following your contract to the letter.
    output:
      diff_summary:
        type: string
        description: Summary of what was changed, each line tracing to a task + spec requirement.
      halt:
        type: string
        description: >-
          Any QUESTION (ambiguity) or DEVIATION that stopped work, or "none".
          Captured for observability; halt-to-escalate routing is an M8 follow-up.
    retry:
      max_attempts: 3
      backoff: exponential
      delay_seconds: 1
      retry_on: [provider_error, timeout]
    routes:
      - to: gates

  - name: gates
    type: script
    description: >-
      Deterministic verification (M4 harness) -- composes L1 + L2 +
      diff-confined-paths + deviation cross-check via
      orchestration.harness.gates. Routed on EXIT CODE, not `pass`.
    command: python3
    args: ["-m", "orchestration.harness.gates"]
    stdin: '{"l1": {"command": "{{ workflow.input.gates_l1_command }}"}}'
    routes:
      - to: verifier

  - name: verifier
    # Persona: personas/verifier.md (spec sec 6.3/5.2 -- fresh, evidence-or-
    # zero, intent-vs-actual, anchored L3 rubric). Deliberately NOT given
    # implementer.output content beyond the gates context: the persona treats
    # any implementer claim as unverified; ground truth is the diff +
    # spec/tasks/deviation.json it reads from the worktree itself.
    description: >-
      Fresh, author != verifier judgment (coverage matrix, L3, intent-vs-actual).
    model: opus # spec sec 6: Verifier = Opus, HIGH effort (effort in persona frontmatter)
    input:
      - gates.output
    prompt: |
      Milestone: {{ workflow.input.milestone_id }}
      {{ workflow.input.milestone_summary }}

      Deterministic gates verdict (exit_code {{ gates.output.exit_code }}):
      {{ gates.output.report | tojson }}

      Judge this milestone per your contract: read spec.md, tasks.md, the
      validation contract, deviation.json, and the git diff of the work; build
      the coverage matrix; run the intent-vs-actual diff; grade the L3
      remainder against the anchored rubric.
    output:
      pass:
        type: boolean
        description: >-
          Hard verdict. True ONLY if coverage fully MET, gates green, diff maps
          entirely to plan+spec (no undeclared deviation, no false completion),
          and every real deviation was declared.
      score:
        type: number
        description: Anchored 0.0-1.0 L3 rubric score (advisory; never rescues a hard FAIL).
      violations:
        type: string
        description: Each undeclared deviation / false completion / hidden deviation found, or "none".
      notes:
        type: string
        description: Rationale; for a FAIL, exactly what is missing (consumed by the Orchestrator).
    retry:
      max_attempts: 3
      backoff: exponential
      delay_seconds: 1
      retry_on: [provider_error, timeout]
    routes:
      # Gates is a deterministic script step -- route on its EXIT CODE, not
      # a `pass` JSON field (flakiness has no `pass` key; exit code is the
      # one uniform signal every harness checker shares). Verifier is the
      # judging step -- it legitimately exposes a `pass` field.
      - to: commit
        when: "{{ gates.output.exit_code == 0 and verifier.output.pass }}"
      - to: counter

  - name: commit
    type: script
    description: >-
      Deterministic milestone commit (durability finish for ONE milestone,
      `orchestration.launch.milestone_commit`) -- after gates + Verifier
      pass, persist the verified diff at the same cadence as the checkpoint
      cursor. The commit verb stays out of every LLM's hands (same consent
      boundary as archive_handoff, spec sec 7.3) and the author!=verifier
      spine holds: the Implementer never commits its own work. Hermetic
      default is dry-run (`commit_dry_run: true`); a non-zero exit
      (status "error") fails the workflow LOUDLY -- a commit failure after
      verified work must never be silent.
    command: python3
    args: ["-m", "orchestration.launch.milestone_commit"]
    stdin: >-
      {{ {"worktree": workflow.input.worktree if workflow.input.worktree else ".",
      "milestone_id": workflow.input.milestone_id,
      "milestone_title": workflow.input.milestone_summary,
      "change_id": workflow.input.change_id,
      "dry_run": workflow.input.commit_dry_run,
      "paths": workflow.input.commit_paths} | tojson }}
    routes:
      - to: "$end"

  - name: counter
    type: set
    description: >-
      Crash-safe attempt counter (P5) -- Conductor, not the Orchestrator
      agent, owns this and the threshold flip. The ONLY thing that counts
      resolution attempts (native `retry:` above is transient-error-only
      and orthogonal to this).
    values:
      attempts: "{{ (counter.output.attempts if counter is defined else 0) + 1 }}"
    routes:
      - to: orchestrator
        when: "{{ output.attempts < (workflow.input.attempt_threshold | default(3) | int) }}"
      - to: escalate

  - name: orchestrator
    # Persona: personas/orchestrator.md (spec sec 6.1 -- stateless resolver;
    # guidance-only; never decides escalation, that is `counter`'s routes).
    description: >-
      Stateless resolution step -- emits next-attempt guidance. Does NOT
      decide human-escalation (Conductor's counter/routes do that).
    model: opus # spec sec 6: Orchestrator = Opus, HIGH effort (effort in persona frontmatter)
    input:
      - verifier.output
      - implementer.output
      - counter.output
    prompt: |
      Milestone {{ workflow.input.milestone_id }} failed attempt {{ counter.output.attempts }}.

      Verifier verdict: pass={{ verifier.output.pass }}, score={{ verifier.output.score }}
      Violations: {{ verifier.output.violations }}
      Verifier notes: {{ verifier.output.notes }}

      Implementer's diff summary: {{ implementer.output.diff_summary }}
      Implementer halt (QUESTION/DEVIATION or "none"): {{ implementer.output.halt }}

      Diagnose why this attempt failed and emit next-attempt guidance per your
      contract (re-scope, supply missing context, tighten, or re-order) -- or
      flag the milestone infeasible as written. Do not decide whether to escalate.
    output:
      guidance:
        type: string
        description: Next-attempt guidance for the Implementer (injected verbatim into its next prompt).
      infeasible:
        type: boolean
        description: True only if the milestone cannot pass as written (reason in guidance).
    retry:
      max_attempts: 3
      backoff: exponential
      delay_seconds: 1
      retry_on: [provider_error, timeout]
    routes:
      - to: implementer

  - name: escalate
    type: script
    description: >-
      `Needs human input` (P7) -- GitHub-label mirror. The CANONICAL pause
      is the `human_gate` step that follows; this only mirrors the status
      to a label for humans scanning issues, not run logs.
    command: python3
    args: ["-m", "orchestration.launch.notify_escalation"]
    stdin: >-
      {{ {"label": "needs-human-input", "dry_run": workflow.input.notify_dry_run,
      "repo": workflow.input.notify_repo, "issue": workflow.input.notify_issue} | tojson }}
    routes:
      - to: human_gate

  - name: human_gate
    type: human_gate
    description: >-
      Needs human input -- parked here until a Mode-A session resolves the
      escalation. This is the canonical pause (spec sec 7.1/7.2); the real
      poll+resume seam (watch for resolution, `conductor resume` from the
      failed milestone) is M7's `orchestration/resume/`.
    prompt: |
      Milestone {{ workflow.input.milestone_id }} exhausted its
      {{ workflow.input.attempt_threshold | default(3) }}-attempt ladder.

      Verifier notes: {{ verifier.output.notes }}

      A human must resolve this in a Mode-A session before the change can
      resume (see the orchestration-resume poll-seam, M7).
    options:
      - label: "Acknowledge (resolution happens out-of-band -- M7's poll+resume seam)"
        value: acknowledged
        route: "$end"

output:
  milestone_id: "{{ workflow.input.milestone_id }}"
  passed: "{{ gates.output.exit_code == 0 and verifier.output.pass }}"
  commit_status: "{{ commit.output.status if commit is defined else '' }}"
  commit_sha: "{{ commit.output.sha if commit is defined else '' }}"
  attempts: "{{ counter.output.attempts if counter is defined else 0 }}"
  escalated: "{{ true if human_gate is defined else false }}"
  escalation_label: "{{ escalate.output.label if escalate is defined else '' }}"
  escalation_notified: "{{ escalate.output.notified if escalate is defined else false }}"
