# Publishes the daemon image to GHCR on version tags (cli-design.md §9).
#
# cb (claudebox CLI) is built from a PINNED kentra-io/claudebox ref inside the
# Dockerfile's cb-build stage (see CLAUDEBOX_REF there) — no host copy here, so
# `make daemon-image` and this workflow produce identical images. Pushing uses
# the workflow's own GITHUB_TOKEN (packages: write) — no PAT or secret needed.
name: publish-daemon

on:
  push:
    tags: ["v*"]

env:
  IMAGE: ghcr.io/kentra-io/agent-orchestration-daemon

jobs:
  build-push:
    # Native arm64 runner: the Dockerfile is aarch64-pinned (static docker +
    # gh downloads), so no QEMU/buildx cross-build is needed.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          VERSION="${GITHUB_REF_NAME}"
          docker build -f container/daemon/Dockerfile \
            -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
