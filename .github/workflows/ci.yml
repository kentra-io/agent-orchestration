name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.27"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install lifecycle CLI
        # The module tracks spec-lifecycle main (v0.1.0 predates `--format`
        # and the archive tasks-gate); build from source at a pinned commit.
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Build lifecycle from pinned commit
        run: go install github.com/kentra-io/spec-lifecycle/cmd/lifecycle@4d1f002755ac && echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Test (pytest)
        run: uv run pytest
