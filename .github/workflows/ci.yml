name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.27"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install lifecycle CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v0.1.0 -R kentra-io/spec-lifecycle \
            -p 'lifecycle_*_linux_amd64.tar.gz' -O /tmp/lifecycle.tgz
          sudo tar -xzf /tmp/lifecycle.tgz -C /usr/local/bin lifecycle
          lifecycle --version || lifecycle version

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Test (pytest)
        run: uv run pytest
